<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Sísmico - Carlos Zinzi</title>
    <style>
        body { font-family: sans-serif; background-color: #1e1e24; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #2a2a35; padding: 20px; border-radius: 12px; }
        .btn-activar { background-color: #f44336; border: none; color: white; padding: 15px; width: 100%; font-size: 16px; cursor: pointer; border-radius: 8px; font-weight: bold; margin-bottom: 20px; }
        .sismo-card { background: #3b3b4a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #00e676; }
        .acordeon { background: #32323e; margin-bottom: 10px; border-radius: 8px; }
        .cabecera { padding: 15px; cursor: pointer; font-weight: bold; border-bottom: 1px solid #444; }
        .contenido { padding: 15px; display: none; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚨 Monitor de Alerta</h1>
    <div style="text-align:center; color:#888; margin-bottom:20px;">Desarrollado por Carlos Zinzi</div>
    
    <button id="btn-activar" class="btn-activar" onclick="iniciarMonitoreo()">ACTIVAR / REFRESCAR DATOS</button>
    <button id="btn-json" style="display:none; width:100%; padding:10px; margin-bottom:20px;" onclick="descargarJSON()">⬇️ Descargar Historial (.JSON)</button>

    <div id="lista-sismos">Esperando activación...</div>

    <h3>📱 Instrucciones de instalación</h3>
    <div class="acordeon">
        <div class="cabecera" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">🍎 iPhone (Safari)</div>
        <div class="contenido">Toca "Compartir" -> "Añadir a pantalla de inicio".</div>
    </div>
    <div class="acordeon">
        <div class="cabecera" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">🤖 Android (Chrome)</div>
        <div class="contenido">Toca los tres puntos -> "Instalar aplicación".</div>
    </div>
</div>

<script>
    let datosTotales = [];
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    async function obtenerDatos() {
        try {
            const t = Date.now();
            const [uRes, fRes] = await Promise.all([
                fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_week.geojson?t=' + t),
                fetch('https://sismosve.rafnixg.dev/api/v1/sismos?t=' + t)
            ]);
            const uData = await uRes.json();
            const fData = await fRes.json();

            let lista = [
                ...uData.features.map(q => ({
                    mag: q.properties.mag, loc: q.properties.place, time: q.properties.time, fuente: 'USGS'
                })).filter(q => q.loc.toLowerCase().includes('venezuela')),
                ...fData.map(q => ({
                    mag: parseFloat(q.magnitud), loc: q.epicentro || "Sismo", time: new Date(q.fecha + 'T' + q.hora).getTime(), fuente: 'FUNVISIS'
                }))
            ];

            datosTotales = lista.sort((a, b) => b.time - a.time);
            renderizar(datosTotales);
        } catch(e) { document.getElementById('lista-sismos').innerHTML = "Error al cargar datos."; }
    }

    function renderizar(lista) {
        document.getElementById('lista-sismos').innerHTML = lista.map(s => `
            <div class="sismo-card">
                <div style="font-size: 1.5em; font-weight:bold;">${s.mag.toFixed(1)}</div>
                <div>${s.loc}</div>
                <small>${new Date(s.time).toLocaleString()} | Fuente: ${s.fuente}</small>
            </div>
        `).join('');
        document.getElementById('btn-json').style.display = 'block';
    }

    function descargarJSON() {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(datosTotales));
        a.download = "sismos_venezuela.json";
        a.click();
    }

    function iniciarMonitoreo() {
        document.getElementById('btn-activar').innerHTML = "✅ MONITOREO ACTIVO";
        obtenerDatos();
        setInterval(obtenerDatos, 60000);
    }
</script>
</body>
</html>
