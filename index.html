<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Sísmico - Venezuela</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e24; color: #ffffff; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #ff6b6b; font-size: 1.8em; }
        
        /* Panel indicador de fuentes */
        .status-bar { text-align: center; background: #2b2b36; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        .status-badge { padding: 6px 12px; border-radius: 20px; margin: 5px; font-size: 0.9em; display: inline-block; font-weight: bold; }
        .active { background-color: #2e7d32; color: white; }
        .error { background-color: #c62828; color: white; }
        .loading { background-color: #f57c00; color: white; }
        
        /* Contenedor principal */
        .container { max-width: 800px; margin: auto; background: #2a2a35; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* Estilos del sismo destacado */
        .sismo-destacado { background: #32323e; padding: 20px; border-radius: 10px; border: 2px solid #555; text-align: center; margin-top: 15px; }
        .mag-container { display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .mag { font-size: 2em; font-weight: bold; color: white; padding: 20px; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
        .mag.low { background-color: #4caf50; }
        .mag.med { background-color: #ff9800; }
        .mag.high { background-color: #f44336; }
        
        .details { margin-bottom: 15px; }
        .details strong { font-size: 1.3em; display: block; margin-bottom: 5px; }
        .details small { color: #aaa; font-size: 1em; }
        
        .source { font-size: 1em; padding: 6px 12px; border-radius: 5px; color: white; font-weight: bold; display: inline-block; }
        .source.usgs { background-color: #1976d2; }
        .source.funvisis { background-color: #d84315; }
        
        .titulo-reciente { font-size: 1.2em; color: #ffeb3b; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 Monitor Sísmico de Venezuela</h1>
    
    <!-- Panel que detecta de dónde vienen los datos -->
    <div class="status-bar">
        <div style="margin-bottom: 10px;">📡 Fuentes de Datos (Monitoreando a Venezuela):</div>
        <span id="status-usgs" class="status-badge loading">USGS ⏳ Buscando...</span>
        <span id="status-funvisis" class="status-badge loading">FUNVISIS ⏳ Buscando...</span>
    </div>

    <!-- Contenedor donde aparecerá el sismo más reciente -->
    <div id="sismos-list">
        <p style="text-align:center; color: #aaa; font-size: 1.2em;">Procesando y filtrando datos para Venezuela...</p>
    </div>
</div>

<script>
    // 1. Extraer datos del USGS y filtrar SOLO los de Venezuela
    async function fetchUSGS() {
        try {
            const response = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson');
            const data = await response.json();
            
            document.getElementById('status-usgs').className = 'status-badge active';
            document.getElementById('status-usgs').innerHTML = 'USGS ✅';
            
            // FILTRO: Solo guardamos los que digan "Venezuela" en la ubicación
            const sismosVenezuela = data.features.filter(q => 
                q.properties.place && q.properties.place.toLowerCase().includes('venezuela')
            );

            return sismosVenezuela.map(q => ({
                source: 'USGS',
                mag: q.properties.mag,
                place: q.properties.place,
                time: new Date(q.properties.time)
            }));
        } catch (e) {
            document.getElementById('status-usgs').className = 'status-badge error';
            document.getElementById('status-usgs').innerHTML = 'USGS (Error) ❌';
            return [];
        }
    }

    // 2. Extraer datos de FUNVISIS (Estos ya son de Venezuela por defecto)
    async function fetchFunvisis() {
        try {
            const response = await fetch('https://sismosve.rafnixg.dev/api/v1/sismos');
            if (!response.ok) throw new Error("Sin respuesta del servidor");
            const data = await response.json();
            
            document.getElementById('status-funvisis').className = 'status-badge active';
            document.getElementById('status-funvisis').innerHTML = 'FUNVISIS ✅';

            return data.map(q => ({
                source: 'FUNVISIS',
                mag: parseFloat(q.magnitud),
                place: (q.epicentro || q.localizacion || 'Sismo en Venezuela') + " - Prof: " + (q.profundidad || 'N/A'),
                time: new Date(q.fecha + 'T' + q.hora)
            }));
        } catch (e) {
            document.getElementById('status-funvisis').className = 'status-badge error';
            document.getElementById('status-funvisis').innerHTML = 'FUNVISIS (Error) ⚠️';
            return [];
        }
    }

    // 3. Unir, ordenar y mostrar SOLO el más reciente
    async function init() {
        const list = document.getElementById('sismos-list');
        
        // Ejecutamos ambas recolecciones al mismo tiempo
        const [usgsData, funvisisData] = await Promise.all([fetchUSGS(), fetchFunvisis()]);
        
        // Juntamos ambas listas (ya filtradas para Venezuela)
        let sismos = [...usgsData, ...funvisisData];

        list.innerHTML = '';
        if (sismos.length === 0) {
            list.innerHTML = '<div class="sismo-destacado"><strong>✅ TODO TRANQUILO ✅</strong><br>No se han registrado sismos en Venezuela en las últimas horas en ninguna de las dos plataformas.</div>';
            return;
        }

        // Ordenamos los sismos de más nuevo a más viejo
        sismos.sort((a, b) => b.time - a.time);

        // SELECCIONAMOS SOLO EL PRIMERO (El más nuevo)
        const sismoMasReciente = sismos[0];
        
        // Definimos el color según la magnitud
        let magVal = sismoMasReciente.mag ? sismoMasReciente.mag.toFixed(1) : '?';
        let colorClass = 'low';
        if (sismoMasReciente.mag >= 4.0 && sismoMasReciente.mag < 6.0) colorClass = 'med';
        if (sismoMasReciente.mag >= 6.0) colorClass = 'high';

        // Etiqueta del servicio ganador
        let sourceClass = sismoMasReciente.source === 'USGS' ? 'usgs' : 'funvisis';

        // Imprimimos el único resultado en un cuadro destacado
        list.innerHTML = `
            <div class="sismo-destacado">
                <div class="titulo-reciente">⚠️ Último Sismo Detectado ⚠️</div>
                <div class="mag-container">
                    <div class="mag ${colorClass}">${magVal}</div>
                </div>
                <div class="details">
                    <strong>${sismoMasReciente.place}</strong>
                    <small>Detectado el: ${sismoMasReciente.time.toLocaleString()}</small>
                </div>
                <div>Reportado por: <span class="source ${sourceClass}">${sismoMasReciente.source}</span></div>
            </div>
        `;
    }

    // Iniciar el proceso cuando termine de cargar la pantalla
    window.onload = init;
</script>
</body>
</html>
