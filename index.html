<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#d9534f">
    
    <title>Sismos Zinzi - Anti-Congelamiento</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9; color: #333; margin: 0; }
        h1 { color: #d9534f; margin-top: 20px; font-size: 28px; }
        .autor { font-size: 14px; color: #777; margin-top: -10px; margin-bottom: 20px; font-style: italic; }
        .caja-sismo { background-color: white; border: 2px solid #ccc; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .magnitud { font-size: 45px; font-weight: bold; color: #d9534f; margin: 15px 0; }
        .lugar { font-size: 20px; font-weight: bold; }
        .fecha { color: #666; font-size: 16px; margin-top: 10px; }
        .seguro { background-color: #dff0d8; border-color: #3c763d; color: #3c763d; }
        .caja-error { background-color: #f8d7da; border: 2px solid #f5c6cb; color: #721c24; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; word-break: break-all; font-size: 14px; }
        button { margin-top: 30px; padding: 20px 30px; font-size: 20px; background-color: #0275d8; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        button:active { background-color: #025aa5; transform: scale(0.98); }
    </style>
</head>
<body>

    <h1>🌎 Monitor Sísmico</h1>
    <div class="autor">Desarrollado por Carlos Zinzi</div>
    <p>Información oficial en tiempo real (USGS)</p>

    <div id="resultado">
        <p>Buscando datos... ⏳</p>
    </div>

    <button onclick="buscarSismos()">🔄 Actualizar ahora</button>

    <script>
        async function buscarSismos() {
            document.getElementById('resultado').innerHTML = "<p>Buscando datos... ⏳</p>";
            
            // Creamos un controlador para abortar si tarda mucho (5 segundos)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            try {
                const respuesta = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson', {
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId); // Limpiamos el temporizador si responde rápido

                if (!respuesta.ok) {
                    throw new Error(`HTTP Error: ${respuesta.status}`);
                }
                
                const datos = await respuesta.json();
                let sismos = datos.features;
                let sismoVenezuela = null;

                for(let i = 0; i < sismos.length; i++) {
                    if(sismos[i].properties.place.includes("Venezuela")) {
                        sismoVenezuela = sismos[i];
                        break;
                    }
                }

                let caja = document.getElementById('resultado');

                if (sismoVenezuela) {
                    let mag = sismoVenezuela.properties.mag;
                    let lugar = sismoVenezuela.properties.place;
                    let fecha = new Date(sismoVenezuela.properties.time).toLocaleString();

                    caja.innerHTML = `
                        <div class="caja-sismo">
                            <p>⚠️ <strong>ÚLTIMO SISMO DETECTADO</strong> ⚠️</p>
                            <div class="magnitud">Mag: ${mag}</div>
                            <div class="lugar">${lugar}</div>
                            <div class="fecha">Hora: ${fecha}</div>
                        </div>
                    `;
                } else {
                    caja.innerHTML = `
                        <div class="caja-sismo seguro">
                            <p>✅ <strong>TODO TRANQUILO</strong> ✅</p>
                            <p>Sin sismos fuertes en las últimas 24 horas.</p>
                        </div>
                    `;
                }
            } catch (error) {
                // Si pasaron 5 segundos o hay un error de red, cae aquí
                let mensajeError = error.message;
                if (error.name === 'AbortError') {
                    mensajeError = "La conexión tardó demasiado (Timeout). El navegador está bloqueando la petición silenciosamente.";
                }

                document.getElementById('resultado').innerHTML = `
                    <div class="caja-error">
                        <p><strong>❌ FALLA DE CONEXIÓN:</strong></p>
                        <p>${mensajeError}</p>
                        <hr>
                        <p><em>Nota: Si estás en un iPhone, desactiva temporalmente el "Relay Privado" de iCloud o las extensiones de Safari para probar.</em></p>
                    </div>
                `;
            }
        }

        buscarSismos();
    </script>
</body>
</html>
